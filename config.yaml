auth:
  secret: "myNameIsSlimShady"
  required_claims:
    - sub
    - exp

circuit_breaker:
  failure_threshold: 5
  cooldown: 30

health_check_interval_secs: 5
balancing: round_robin

# Top-level backends — still used by the health checker and hot-reload watcher.
# When a `routes:` block is present, the router uses per-route backend lists instead.
backends:
  - url: "http://127.0.0.1:4000"
    weight: 3
  - url: "http://127.0.0.1:4001"
    weight: 4
  - url: "http://127.0.0.1:4002"
    weight: 2

# Phase 8A — path-based routing rules.
# Evaluated top-to-bottom; first match wins.
# "*" catch-all MUST be last.
routes:
  - match: "/api/*"
    label: "api"
    split:
      - backends: ["http://127.0.0.1:4000"]
        weight: 90    # 90% → stable
      - backends: ["http://127.0.0.1:4002"]
        weight: 10    # 10% → canary

  - match: "/static/*"
    label: "static"
    backends:
      - url: "http://127.0.0.1:4001"

  - match: "*"
    label: "default"
    backends:
      - url: "http://127.0.0.1:4003"

rate_limit:
  requests: 100
  window_secs: 1
  per: ip 
access_log:
  path: "./access.log"
  enabled: true

admin:
  port: 9000
  token: "thisIsMyAdminTokinSlimShady2IfUWIll"

tls:
  cert_path: "./cert.pem"
  key_path: "./key.pem"

etcd:                                                                                                                        
  endpoint: "http://localhost:2379"                                                                                          
  key: "/clawgate/backends"